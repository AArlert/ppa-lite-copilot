# CI 硬门禁：文档结构 + 证据链校验（仿真门禁在本地 VM，见 CLAUDE.md §5/§7）
name: ci
on:
  push:
  pull_request:
jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docs-check
        run: python3 scripts/docs.py --check
      - name: handover 冒烟（守卫脚本解析路径不崩即通过）
        run: python3 scripts/docs.py --handover
