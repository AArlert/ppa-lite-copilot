# PPA-Lite 覆盖率测量域配置（M4-04 覆盖率过滤登记 —— 域级过滤）
# 用法：make regress COV=1 CMHIER=cov_exclude/cov_domain.cfg（VCS -cm_hier，编译+仿真同时传入）
#
# 语义：覆盖率只统计"设计 + 验证环境域"= tb_top 子树（RTL + tb/ 下 UVM 组件与
#       接口/协议 SVA），排除 UVM-1.2 供应商库骨架与 VCS 自动录制模块——它们属
#       验证域外（spec §0 适配 7 的六类口径针对设计+验证环境，不含第三方库），
#       且 DV/DE 均无法也不应修复其覆盖。等价于 urg hierarchy 报告中 tb_top 顶层
#       实例行（本仓库据此行汇报域覆盖率）。
#
# 排除对象（与 coverage-exclude-registration.md M4-04 表一一对应）：
#   - uvm_pkg（UVM-1.2 类库，含 uvm_reg_map do_read/do_write 内建断言）
#   - uvm_custom_install_recording / uvm_custom_install_verdi_recording（VCS -kdb 自动录制骨架）
#
# 仅纳入 tb_top 子树；上述 UVM 库模块为 tb_top 的兄弟顶层实例/包，+tree 后自然排除，
# 另显式 -module 双保险。
+tree tb_top
-module uvm_pkg
-module uvm_custom_install_recording
-module uvm_custom_install_verdi_recording
